<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维作品评分系统 - 作品评审</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-section">
                <div class="logo-icon">💠</div>
                <div>
                    <h1>三维作品评分系统</h1>
                    <p class="subtitle">{{ data_dir }}</p>
                </div>
            </div>
            <div class="stats-card">
                <span class="stat-label">作品总数</span>
                <span class="stat-value" id="totalGroups">--</span>
            </div>
        </header>

        <!-- 导航标签 -->
        <div class="nav-tabs" style="display:flex; gap:20px; margin-bottom:20px;">
            <a href="/" class="nav-tab active"
                style="padding:8px 16px; color:var(--accent); text-decoration:none; border-bottom:2px solid var(--accent);">📦
                作品列表</a>
            <a href="/students" class="nav-tab"
                style="padding:8px 16px; color:var(--text-secondary); text-decoration:none; border-bottom:2px solid transparent;">👤
                学生列表</a>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="filter-group">
                <label>排序方式：</label>
                <select id="sortSelect" onchange="applyFilters()">
                    <option value="score_desc">分数 (高→低)</option>
                    <option value="score_asc">分数 (低→高)</option>
                    <option value="name_asc">名称 (A→Z)</option>
                </select>
            </div>

            <div class="filter-group">
                <label>筛选：</label>
                <select id="filterSelect" onchange="applyFilters()">
                    <option value="all">显示全部</option>
                    <option value="unconfirmed">仅未确认</option>
                    <option value="confirmed">仅已确认</option>
                    <option value="blender">使用 Blender</option>
                </select>
            </div>
        </div>

        <main class="content-area">
            <div id="groupGrid" class="group-grid">
                <!-- Group cards injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>正在加载评分数据...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const COURSE_TYPE = "{{ course }}";
        let allGroups = [];

        async function loadGroups() {
            try {
                const dv = localStorage.getItem('data_version') || '0';
                const res = await fetch('/api/targets?v=' + dv);
                const data = await res.json();
                allGroups = data.data.map(t => {
                    const info = t.grading_result?.group_info || {};
                    return {
                        group_name: t.name,
                        target_id: t.target_id,
                        total_score: Math.round(t.total_score || 0),
                        members: t.individuals ? t.individuals.map(i => i.student_name) : [],
                        member_count: t.individuals ? t.individuals.length : 0,
                        thumbnail: '/api/thumbnail/' + t.target_id,
                        poly_count: info.poly_count || 0,
                        confirmed: info.confirmed || false,
                        uses_ai: info.uses_ai || false,
                        self_selected_topic: info.self_selected_topic || false,
                        is_blender: t.is_blender || false
                    };
                });
                document.getElementById('totalGroups').innerText = allGroups.length;

                // Restore state
                const savedSort = localStorage.getItem('groupSort');
                const savedFilter = localStorage.getItem('groupFilter');

                if (savedSort) {
                    document.getElementById('sortSelect').value = savedSort;
                }
                if (savedFilter) {
                    document.getElementById('filterSelect').value = savedFilter;
                }

                applyFilters(); // Initial render with filters
            } catch (e) {
                console.error(e);
                document.getElementById('groupGrid').innerHTML = '<div class="error">加载失败</div>';
            }
        }

        function applyFilters() {
            const sortType = document.getElementById('sortSelect').value;
            const filterType = document.getElementById('filterSelect').value;

            // Save state
            localStorage.setItem('groupSort', sortType);
            localStorage.setItem('groupFilter', filterType);

            let filtered = [...allGroups];

            // Filter
            if (filterType === 'unconfirmed') {
                filtered = filtered.filter(g => !g.confirmed);
            } else if (filterType === 'confirmed') {
                filtered = filtered.filter(g => g.confirmed);
            } else if (filterType === 'blender') {
                filtered = filtered.filter(g => g.is_blender);
            }

            // Sort
            filtered.sort((a, b) => {
                if (sortType === 'score_desc') {
                    return b.total_score - a.total_score;
                } else if (sortType === 'score_asc') {
                    return a.total_score - b.total_score;
                } else if (sortType === 'name_asc') {
                    return a.group_name.localeCompare(b.group_name, 'zh-Hans-CN');
                }
                return 0;
            });

            renderGroups(filtered);
        }

        function renderGroups(groups) {
            const container = document.getElementById('groupGrid');
            if (groups.length === 0) {
                container.innerHTML = '<div class="empty">暂无符合条件的作品</div>';
                return;
            }

            const blenderSvg = `<svg class="blender-icon" role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor"><path d="M12.51 13.214c.046-.8.438-1.506 1.03-2.006a3.424 3.424 0 0 1 2.212-.79c.85 0 1.631.3 2.211.79.592.5.983 1.206 1.028 2.005.045.823-.285 1.586-.865 2.153a3.389 3.389 0 0 1-2.374.938 3.393 3.393 0 0 1-2.376-.938c-.58-.567-.91-1.33-.865-2.152M7.35 14.831c.006.314.106.922.256 1.398a7.372 7.372 0 0 0 1.593 2.757 8.227 8.227 0 0 0 2.787 2.001 8.947 8.947 0 0 0 3.66.76 8.964 8.964 0 0 0 3.657-.772 8.285 8.285 0 0 0 2.785-2.01 7.428 7.428 0 0 0 1.592-2.762 6.964 6.964 0 0 0 .25-3.074 7.123 7.123 0 0 0-1.016-2.779 7.764 7.764 0 0 0-1.852-2.043h.002L13.566 2.55l-.02-.015c-.492-.378-1.319-.376-1.86.002-.547.382-.609 1.015-.123 1.415l-.001.001 3.126 2.543-9.53.01h-.013c-.788.001-1.545.518-1.695 1.172-.154.665.38 1.217 1.2 1.22V8.9l4.83-.01-8.62 6.617-.034.025c-.813.622-1.075 1.658-.563 2.313.52.667 1.625.668 2.447.004L7.414 14s-.069.52-.063.831zm12.09 1.741c-.97.988-2.326 1.548-3.795 1.55-1.47.004-2.827-.552-3.797-1.538a4.51 4.51 0 0 1-1.036-1.622 4.282 4.282 0 0 1 .282-3.519 4.702 4.702 0 0 1 1.153-1.371c.942-.768 2.141-1.183 3.396-1.185 1.256-.002 2.455.41 3.398 1.175.48.391.87.854 1.152 1.367a4.28 4.28 0 0 1 .522 1.706 4.236 4.236 0 0 1-.239 1.811 4.54 4.54 0 0 1-1.035 1.626"/></svg>`;

            container.innerHTML = groups.map((g, idx) => `
                <div class="group-card" onclick="location.href='/detail/${encodeURIComponent(g.target_id)}'">
                    ${g.thumbnail ? `<div class="card-thumbnail"><img src="${g.thumbnail}" alt="预览" loading="lazy"></div>` : ''}
                    <div class="card-content" style="padding: 12px 15px;">
                        <div class="card-header" style="margin-bottom: 0; align-items: center; gap: 10px;">
                            <div class="rank" style="flex-shrink: 0;">#${idx + 1}${g.uses_ai ? '<span class="ai-mini-badge" title="使用了AI">🤖</span>' : ''}${g.is_blender ? `<span class="blender-mini-badge" title="Blender源文件">${blenderSvg}</span>` : ''}${g.confirmed ? '<span class="confirmed-mini-badge" title="成绩已确认">✓</span>' : '<span class="unconfirmed-mini-badge" title="未确认">?</span>'}</div>
                            <h3 class="group-name" title="${g.group_name}" style="flex: 1; margin: 0; text-align: left;">${g.group_name}</h3>
                            <div class="score-badge" style="flex-shrink: 0;">${g.total_score} 分</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Back to Top Logic
        const topBtn = document.createElement('button');
        topBtn.className = 'back-to-top-btn';
        topBtn.innerHTML = '↑';
        topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        document.body.appendChild(topBtn);

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                topBtn.classList.add('visible');
            } else {
                topBtn.classList.remove('visible');
            }
        });

        loadGroups();
    </script>
</body>

</html>
