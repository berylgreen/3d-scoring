<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - 3D 评分管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .content-prose img { border-radius: 0.5rem; margin-top: 1rem; margin-bottom: 1rem; }
        .content-prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .content-prose td, .content-prose th { border: 1px solid #e2e8f0; padding: 0.5rem; }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        {% raw %}
        <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-slate-500 hover:text-indigo-600 transition-colors p-2 rounded-full hover:bg-indigo-50">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900" v-if="target">{{ target.name }}</h1>
                    <div class="h-6 w-48 bg-slate-200 animate-pulse rounded" v-else></div>
                </div>
            </div>
            
            <div v-if="target" class="flex items-center space-x-3 bg-white px-4 py-1.5 rounded-full border border-slate-200 shadow-sm">
                <span class="text-sm font-semibold text-slate-500">总分</span>
                <span class="text-xl font-bold text-indigo-600">{{ target.total_score }}</span>
            </div>
        </header>

        <main class="flex-grow p-6 lg:p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div v-if="loading" class="col-span-full flex justify-center items-center h-64">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            </div>

            <template v-else-if="target">
                <!-- Left Column: Media & Content -->
                <div class="lg:col-span-2 space-y-8">
                    
                    <!-- Media Section -->
                    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                            <h2 class="text-base font-semibold text-slate-800 flex items-center">
                                <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                作品展示
                            </h2>
                        </div>
                        <div class="p-6">
                            <!-- Animation Video -->
                            <div v-if="course === 'animation' && media.video_url" class="aspect-video bg-black rounded-lg overflow-hidden shadow-inner">
                                <video controls class="w-full h-full" :src="media.video_url"></video>
                            </div>
                            
                            <!-- Modeling Images -->
                            <div v-else-if="course === 'modeling' && media.effect_images && media.effect_images.length">
                                <div class="grid grid-cols-2 gap-4">
                                    <div v-for="(img, idx) in media.effect_images" :key="idx" class="aspect-video bg-slate-100 rounded-lg overflow-hidden border border-slate-200 cursor-pointer hover:border-indigo-400 transition-colors">
                                        <img :src="img" class="w-full h-full object-cover" alt="Effect Image">
                                    </div>
                                </div>
                            </div>
                            
                            <div v-else class="text-center py-12 text-slate-400 bg-slate-50 rounded-lg border border-dashed border-slate-200">
                                未找到媒体文件
                            </div>
                        </div>
                    </section>

                    <!-- Docx Content -->
                    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                            <h2 class="text-base font-semibold text-slate-800 flex items-center">
                                <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                报告内容
                            </h2>
                        </div>
                        <div class="p-6 content-prose text-sm max-h-[800px] overflow-y-auto" v-html="document_html"></div>
                    </section>
                </div>

                <!-- Right Column: Scores & Info -->
                <div class="space-y-6">
                    
                    <!-- Score Details -->
                    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-indigo-50/30">
                            <h2 class="text-base font-semibold text-slate-800">评分详情</h2>
                        </div>
                        <div class="p-5">
                            <div class="space-y-4">
                                <div v-for="(val, key) in formatScores(getScores())" :key="key">
                                    <div class="flex justify-between text-sm mb-1">
                                        <span class="font-medium text-slate-600">{{ key }}</span>
                                        <span class="text-slate-900 font-semibold">{{ val }} 分</span>
                                    </div>
                                    <div class="w-full bg-slate-100 rounded-full h-2">
                                        <div class="bg-indigo-500 h-2 rounded-full" :style="{ width: Math.min((val / 25) * 100, 100) + '%' }"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Overall Comment -->
                            <div class="mt-6 pt-5 border-t border-slate-100" v-if="getComment()">
                                <h3 class="text-sm font-semibold text-slate-800 mb-2">综合评语</h3>
                                <p class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-lg border border-slate-100">{{ getComment() }}</p>
                            </div>
                        </div>
                    </section>

                    <!-- Group Individuals (If Mode == Group) -->
                    <section v-if="mode === 'group' && target.individuals && target.individuals.length" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                            <h2 class="text-base font-semibold text-slate-800">小组成员</h2>
                        </div>
                        <div class="divide-y divide-slate-100">
                            <div v-for="ind in target.individuals" :key="ind.student_name" class="p-5">
                                <div class="flex justify-between items-center mb-3">
                                    <div class="flex items-center space-x-3">
                                        <!-- Personal Image Avatar if available -->
                                        <img v-if="media.personal_images && media.personal_images[ind.student_name]" 
                                             :src="media.personal_images[ind.student_name]" 
                                             class="w-10 h-10 rounded-full object-cover border border-slate-200">
                                        <div v-else class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold">
                                            {{ ind.student_name.charAt(0) }}
                                        </div>
                                        <div>
                                            <h4 class="font-semibold text-slate-900">{{ ind.student_name }}</h4>
                                            <p class="text-xs text-slate-500">{{ ind.role || '成员' }}</p>
                                        </div>
                                    </div>
                                    <span class="text-lg font-bold text-indigo-600">{{ ind.individual_score }}</span>
                                </div>
                                <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded mt-2">
                                    <p class="font-medium mb-1">工作内容:</p>
                                    <p class="text-slate-500 mb-2">{{ ind.task_description }}</p>
                                    <p class="font-medium mb-1 border-t border-slate-200 pt-2">评价:</p>
                                    <p class="text-slate-500">{{ ind.individual_comment }}</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Max Files (Modeling) -->
                    <section v-if="course === 'modeling' && media.max_files && media.max_files.length" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                         <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                            <h2 class="text-base font-semibold text-slate-800">源文件 (.max)</h2>
                        </div>
                        <ul class="divide-y divide-slate-100 max-h-48 overflow-y-auto">
                            <li v-for="file in media.max_files" :key="file.name" class="p-3 flex justify-between items-center text-sm">
                                <span class="truncate text-slate-600 max-w-[200px]" :title="file.name">{{ file.name }}</span>
                                <span class="text-slate-400 text-xs whitespace-nowrap">{{ file.size }}</span>
                            </li>
                        </ul>
                    </section>
                </div>
            </template>
        </main>
        {% endraw %}
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const target_id = '{{ target_id }}';
                const mode = '{{ mode }}';
                const course = '{{ course }}';
                
                const loading = ref(true);
                const target = ref(null);
                const document_html = ref('');
                const media = ref({});

                onMounted(async () => {
                    try {
                        const res = await fetch(`/api/target/${encodeURIComponent(target_id)}`);
                        const data = await res.json();
                        if (data.success) {
                            target.value = data.target;
                            document_html.value = data.document_html;
                            media.value = data.media;
                        } else {
                            alert("Failed to load details");
                        }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        loading.value = false;
                    }
                });

                const getScores = () => {
                    if (!target.value) return {};
                    if (mode === 'group') {
                        return target.value.grading_result?.group_info?.scores || {};
                    } else {
                        return target.value.grading_result?.scores || {};
                    }
                };

                const getComment = () => {
                    if (!target.value) return '';
                    if (mode === 'group') {
                        return target.value.grading_result?.group_info?.comments || '';
                    } else {
                        return target.value.grading_result?.overallComment || '';
                    }
                };

                const formatScores = (scoresObj) => {
                    const dict = {
                        "theme": "主题思想",
                        "character_animation": "角色动画",
                        "scene_camera": "场景镜头",
                        "material_lighting": "材质光影",
                        "render_postprocess": "渲染后期",
                        "documentation": "文档整理",
                        "theme_difficulty": "主题难度",
                        "modeling_accuracy": "建模准确度",
                        "topology": "拓扑结构",
                        "materials_textures": "材质贴图",
                        "uv_mapping": "UV映射",
                        "lighting_rendering": "光照渲染",
                        "visual_quality": "视觉质量",
                        "modeling": "建模水平",
                        "texture": "材质贴图",
                        "render": "渲染水平"
                    };
                    const res = {};
                    for (const [k, v] of Object.entries(scoresObj)) {
                        res[dict[k] || k] = v;
                    }
                    return res;
                };

                return {
                    mode, course, target, loading, document_html, media,
                    getScores, getComment, formatScores
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
