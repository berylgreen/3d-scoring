<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 评分管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .hover-scale { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-scale:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">3D 评分管理系统</h1>
                    <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">{{ '动画' if course == 'animation' else '建模' }} • {{ '小组评分' if mode == 'group' else '个人评分' }}</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <input v-model="searchQuery" type="text" placeholder="搜索名称或学号..." class="pl-10 pr-4 py-2 rounded-full border border-slate-200 bg-white/50 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all w-64">
                    <svg class="w-5 h-5 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow p-6 lg:px-12 max-w-7xl mx-auto w-full">
            {% raw %}
            <div v-if="loading" class="flex justify-center items-center h-64">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            </div>

            <div v-else-if="filteredTargets.length === 0" class="text-center py-20">
                <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                </svg>
                <h3 class="mt-2 text-sm font-medium text-slate-900">未找到记录</h3>
                <p class="mt-1 text-sm text-slate-500">没有匹配的数据，请尝试调整搜索条件。</p>
            </div>

            <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Card -->
                <a :href="'/detail/' + target.target_id" v-for="target in filteredTargets" :key="target.target_id" class="block bg-white rounded-2xl overflow-hidden hover-scale border border-slate-100 relative group">
                    <!-- Thumbnail -->
                    <div class="aspect-video bg-slate-100 relative overflow-hidden">
                        <img :src="'/api/thumbnail/' + target.target_id" @error="handleImageError" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Thumbnail">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </div>
                    
                    <!-- Content -->
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-slate-900 line-clamp-1" :title="target.name">{{ target.name }}</h3>
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">
                                {{ target.total_score }} 分
                            </span>
                        </div>
                        
                        <p v-if="target.project_name" class="text-sm text-slate-500 line-clamp-1 mb-3">{{ target.project_name }}</p>
                        
                        <div class="flex items-center text-xs text-slate-400 mt-4 space-x-3">
                            <span v-if="target.class_name" class="flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>{{ target.class_name }}</span>
                            <span v-if="target.individuals && target.individuals.length" class="flex items-center"><svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>{{ target.individuals.length }} 人</span>
                        </div>
                    </div>
                </a>
            </div>
            {% endraw %}
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const mode = '{{ mode }}';
                const course = '{{ course }}';
                const targets = ref([]);
                const loading = ref(true);
                const searchQuery = ref('');

                onMounted(async () => {
                    try {
                        const res = await fetch('/api/targets');
                        const data = await res.json();
                        if (data.success) {
                            targets.value = data.data;
                        }
                    } catch (e) {
                        console.error("Failed to load data", e);
                    } finally {
                        loading.value = false;
                    }
                });

                const filteredTargets = computed(() => {
                    if (!searchQuery.value) return targets.value;
                    const q = searchQuery.value.toLowerCase();
                    return targets.value.filter(t => 
                        (t.name && t.name.toLowerCase().includes(q)) || 
                        (t.target_id && t.target_id.toLowerCase().includes(q)) ||
                        (t.project_name && t.project_name.toLowerCase().includes(q)) ||
                        (t.class_name && t.class_name.toLowerCase().includes(q))
                    );
                });

                const handleImageError = (e) => {
                    e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="%23cbd5e1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>';
                    e.target.classList.add('p-8', 'opacity-50');
                };

                return {
                    mode, course, targets, loading, searchQuery, filteredTargets, handleImageError
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
